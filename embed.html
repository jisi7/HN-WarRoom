<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HN Research Library</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: white;
  color: #2C2A27;
}

.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #9a9590;
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid #d4cec6;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: #2C2A27;
  outline: none;
  background: white;
  transition: border-color 0.2s;
}

#search:focus { border-color: #A3988B; }
#search::placeholder { color: #b0a89f; }

.filter-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid #d4cec6;
  background: white;
  color: #7a7570;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn:hover { border-color: #A3988B; color: #2C2A27; }
.filter-btn.active { background: #2C2A27; color: white; border-color: #2C2A27; }

.stats-row {
  display: flex;
  gap: 28px;
  padding: 12px 0;
  margin-bottom: 24px;
  border-top: 1px solid #e8e3dc;
  border-bottom: 1px solid #e8e3dc;
}

.stat { display: flex; align-items: center; gap: 6px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-num { font-size: 18px; font-weight: 600; color: #2C2A27; }
.stat-label { font-size: 11px; color: #9a9590; text-transform: uppercase; letter-spacing: 0.06em; }

.category-section { margin-bottom: 40px; }

.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1.5px solid #e8e3dc;
}

.cat-bar { width: 4px; height: 20px; border-radius: 2px; }
.cat-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: #2C2A27; }
.cat-count { font-size: 11px; color: #b0a89f; margin-left: auto; }

.articles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.article-card {
  background: white;
  border: 1px solid #e8e3dc;
  border-left: 3px solid transparent;
  border-radius: 8px;
  padding: 16px;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: all 0.15s;
}

.article-card:hover {
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transform: translateY(-1px);
}

.card-date { font-size: 11px; color: #b0a89f; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.card-title { font-size: 13px; font-weight: 500; color: #2C2A27; line-height: 1.5; margin-bottom: 10px; }
.card-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 500; color: white; }
.card-arrow { float: right; font-size: 14px; color: #d4cec6; margin-top: 1px; }

.empty { text-align: center; padding: 60px 20px; color: #b0a89f; }
.empty p { font-size: 14px; }

.loading { text-align: center; padding: 60px 20px; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid #e8e3dc;
  border-top-color: #A3988B;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: #b0a89f; }

@media (max-width: 600px) {
  .stats-row { gap: 16px; flex-wrap: wrap; }
  .articles-grid { grid-template-columns: 1fr; }
  .filter-btn { padding: 7px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="search-row">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Search research briefs...">
  </div>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Cognitive Performance">Cognition</button>
  <button class="filter-btn" data-filter="Physical Performance">Performance</button>
  <button class="filter-btn" data-filter="Foundational Health and Longevity">Longevity</button>
  <button class="filter-btn" data-filter="Research Briefs">General</button>
</div>

<div class="stats-row">
  <div class="stat">
    <span class="stat-num" id="total-count">—</span>
    <span class="stat-label">Articles</span>
  </div>
  <div class="stat">
    <span class="stat-dot" style="background:#24418F"></span>
    <span class="stat-num" id="cog-count">—</span>
    <span class="stat-label">Cognition</span>
  </div>
  <div class="stat">
    <span class="stat-dot" style="background:#D2042D"></span>
    <span class="stat-num" id="perf-count">—</span>
    <span class="stat-label">Performance</span>
  </div>
  <div class="stat">
    <span class="stat-dot" style="background:#C8893A"></span>
    <span class="stat-num" id="lon-count">—</span>
    <span class="stat-label">Longevity</span>
  </div>
</div>

<div id="library-content">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading research library...</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ykzkivpcojjzmbbnuewj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlremtpdnBjb2pqem1iYm51ZXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzUxODAsImV4cCI6MjA5MzE1MTE4MH0.V4cEKUNZXoLXTDw0zhMRN8LIlBfEl_TChHHzKkGxo2w';

const CATS = {
  'Cognitive Performance':             { color: '#24418F', label: 'Cognition' },
  'Physical Performance':              { color: '#D2042D', label: 'Performance' },
  'Foundational Health and Longevity': { color: '#C8893A', label: 'Longevity' },
  'Research Briefs':                   { color: '#A3988B', label: 'General' }
};

const PROD_CAT = {
  focase:    'Cognitive Performance',
  creatine:  'Physical Performance',
  vitamin_d: 'Foundational Health and Longevity',
  general:   'Research Briefs'
};

let all = [], activeFilter = 'all', query = '';

async function load() {
  try {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/articles?status=eq.published&order=published_at.desc&limit=500',
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    const data = await r.json();
    all = Array.isArray(data) ? data : [];
    updateStats();
    render();
  } catch(e) {
    document.getElementById('library-content').innerHTML =
      '<div class="empty"><p>Unable to load articles. Please refresh.</p></div>';
  }
}

function cat(a) { return a.product && PROD_CAT[a.product] ? PROD_CAT[a.product] : 'Research Briefs'; }

function fmt(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); }
  catch { return ''; }
}

function updateStats() {
  document.getElementById('total-count').textContent = all.length;
  document.getElementById('cog-count').textContent  = all.filter(a => cat(a) === 'Cognitive Performance').length;
  document.getElementById('perf-count').textContent = all.filter(a => cat(a) === 'Physical Performance').length;
  document.getElementById('lon-count').textContent  = all.filter(a => cat(a) === 'Foundational Health and Longevity').length;
}

function render() {
  let filtered = all;
  if (activeFilter !== 'all') filtered = filtered.filter(a => cat(a) === activeFilter);
  if (query) {
    const q = query.toLowerCase();
    filtered = filtered.filter(a =>
      (a.title || '').toLowerCase().includes(q) ||
      (a.keyword || '').toLowerCase().includes(q)
    );
  }

  if (!filtered.length) {
    document.getElementById('library-content').innerHTML =
      '<div class="empty"><p>No articles found. Try adjusting your search or filter.</p></div>';
    return;
  }

  const order = ['Cognitive Performance','Physical Performance','Foundational Health and Longevity','Research Briefs'];
  let html = '';
  for (const c of order) {
    const items = filtered.filter(a => cat(a) === c);
    if (!items.length) continue;
    const cfg = CATS[c] || { color: '#A3988B', label: c };
    html += '<div class="category-section">'
      + '<div class="category-header">'
      + '<div class="cat-bar" style="background:' + cfg.color + '"></div>'
      + '<span class="cat-title">' + c + '</span>'
      + '<span class="cat-count">' + items.length + ' article' + (items.length !== 1 ? 's' : '') + '</span>'
      + '</div>'
      + '<div class="articles-grid">'
      + items.map(a => {
          const url = a.shopify_url || '#';
          const title = a.title || 'Untitled';
          const date = fmt(a.published_at);
          return '<a href="' + url + '" target="_blank" class="article-card" style="border-left-color:' + cfg.color + '">'
            + '<div class="card-date">' + date + '</div>'
            + '<div class="card-title">' + title + '<span class="card-arrow">&#x2192;</span></div>'
            + '<span class="card-badge" style="background:' + cfg.color + '">' + cfg.label + '</span>'
            + '</a>';
        }).join('')
      + '</div></div>';
  }
  document.getElementById('library-content').innerHTML = html;
}

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

load();
</script>
</body>
</html>
